<script>
        function fillForm(email, role, name) {
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const roleSpan = document.getElementById('current-role');
            const badge = document.getElementById('role-badge');

            // Set values
            emailInput.value = email;
            passwordInput.value = 'taruca2024';
            roleSpan.innerText = role.toUpperCase();

            // Visual feedback animation
            badge.classList.remove('animate-bounce');
            void badge.offsetWidth; // trigger reflow
            badge.classList.add('animate-bounce');

            emailInput.classList.add('ring-2', 'ring-primary');
            setTimeout(() => {
                emailInput.classList.remove('ring-2', 'ring-primary');
            }, 500);
        }

        // Add some basic form interaction
        document.getElementById('login-form').addEventListener('submit', (e) => {
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Ingresando...';
            btn.disabled = true;

            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.disabled = false;
                alert('¡Credenciales válidas! Redirigiendo al dashboard de Taruca...');
            }, 1500);
        });
    </script>

<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Taruca - Recuperar Contraseña</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,100..1000&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-error": "#ffffff",
                    "tertiary": "#006243",
                    "surface-container-high": "#dce9ff",
                    "background": "#f8f9ff",
                    "secondary-fixed-dim": "#bec6e0",
                    "error": "#ba1a1a",
                    "surface-container": "#e5eeff",
                    "secondary": "#565e74",
                    "on-tertiary-fixed": "#002114",
                    "on-primary-container": "#eeefff",
                    "surface-container-highest": "#d3e4fe",
                    "inverse-surface": "#213145",
                    "surface": "#f8f9ff",
                    "surface-container-low": "#eff4ff",
                    "on-primary-fixed": "#00174b",
                    "on-background": "#0b1c30",
                    "tertiary-container": "#007d57",
                    "on-secondary": "#ffffff",
                    "on-tertiary-fixed-variant": "#005137",
                    "surface-variant": "#d3e4fe",
                    "on-surface": "#0b1c30",
                    "secondary-container": "#dae2fd",
                    "surface-tint": "#0053db",
                    "outline-variant": "#c3c6d7",
                    "on-secondary-fixed-variant": "#3f465c",
                    "primary-fixed-dim": "#b4c5ff",
                    "outline": "#737686",
                    "on-tertiary": "#ffffff",
                    "on-surface-variant": "#434655",
                    "on-secondary-fixed": "#131b2e",
                    "tertiary-fixed-dim": "#68dba9",
                    "secondary-fixed": "#dae2fd",
                    "inverse-on-surface": "#eaf1ff",
                    "surface-dim": "#cbdbf5",
                    "tertiary-fixed": "#85f8c4",
                    "primary-fixed": "#dbe1ff",
                    "inverse-primary": "#b4c5ff",
                    "surface-bright": "#f8f9ff",
                    "on-error-container": "#93000a",
                    "on-primary-fixed-variant": "#003ea8",
                    "primary-container": "#2563eb",
                    "on-secondary-container": "#5c647a",
                    "on-tertiary-container": "#bdffdc",
                    "surface-container-lowest": "#ffffff",
                    "on-primary": "#ffffff",
                    "primary": "#004ac6",
                    "error-container": "#ffdad6"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "body-md": ["Roboto Flex"],
                    "headline-sm": ["Roboto Flex"],
                    "headline-lg": ["Roboto Flex"],
                    "headline-md": ["Roboto Flex"],
                    "label-md": ["Roboto Flex"]
            },
            "fontSize": {
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                    "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}]
            }
          },
        },
      }
    </script>
<style>
        body {
            background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Roboto Flex', sans-serif;
            margin: 0;
            padding: 24px;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        .input-focus:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
            outline: none;
        }
        #success-state {
            display: none;
        }
    </style>
</head>
<body class="bg-primary-container">
<!-- Shell Suppression: No SideNav/TopAppBar as this is a focused transactional screen -->
<main class="w-full max-w-[440px]">
<!-- Brand Logo Anchor -->
<div class="flex justify-center mb-8">
<h1 class="font-headline-lg text-headline-lg text-white">Taruca</h1>
</div>
<!-- Center Card -->
<div class="glass-effect rounded-xl shadow-lg p-8 md:p-10 transition-all duration-500" id="forgot-password-card">
<!-- Default Form State -->
<div id="form-state">
<div class="flex flex-col items-center text-center mb-8">
<div class="w-16 h-16 bg-surface-container-high rounded-full flex items-center justify-center mb-4">
<span class="text-4xl">🔑</span>
</div>
<h2 class="font-headline-md text-headline-md text-on-background mb-2">¿Olvidaste tu contraseña?</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Ingresa tu email para recibir instrucciones de recuperación.</p>
</div>
<form class="space-y-6" id="recovery-form" onsubmit="handleFormSubmit(event)">
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-2" for="email">Correo electrónico</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="w-full pl-10 pr-4 py-3 rounded-lg border border-outline-variant bg-surface-container-lowest font-body-md text-body-md text-on-surface input-focus transition-all" id="email" placeholder="ejemplo@escuela.com" required="" type="email"/>
</div>
</div>
<button class="w-full bg-primary-container text-on-primary font-headline-sm text-headline-sm py-3 rounded-lg shadow-sm hover:brightness-110 active:scale-[0.98] transition-all duration-200" type="submit">
                        Enviar instrucciones
                    </button>
</form>
</div>
<!-- Success State -->
<div class="text-center animate-in fade-in zoom-in duration-300" id="success-state">
<div class="flex flex-col items-center">
<div class="w-16 h-16 bg-tertiary-fixed rounded-full flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-tertiary text-4xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<h2 class="font-headline-md text-headline-md text-on-background mb-2">Solicitud enviada</h2>
<p class="font-body-md text-body-md text-on-surface-variant mb-8">
                        Hemos enviado un enlace de recuperación a <span class="font-bold text-on-background" id="display-email"></span>. Revisa tu bandeja de entrada.
                    </p>
<button class="w-full border border-outline-variant text-on-surface-variant font-label-md text-label-md py-3 rounded-lg hover:bg-surface-container transition-colors" onclick="resetForm()">
                        Reintentar con otro correo
                    </button>
</div>
</div>
<!-- Navigation Footer -->
<div class="mt-8 pt-8 border-t border-outline-variant text-center">
<a class="inline-flex items-center gap-2 font-label-md text-label-md text-primary hover:underline transition-all" href="#">
<span class="material-symbols-outlined text-sm">arrow_back</span>
                    Volver al login
                </a>
</div>
</div>
<!-- Extra Info Footer -->
<p class="text-center mt-6 font-label-md text-label-md text-white/70">
            ¿Necesitas ayuda? <a class="text-white hover:underline" href="#">Contactar a soporte</a>
</p>
</main>
<script>
        function handleFormSubmit(event) {
            event.preventDefault();
            const emailValue = document.getElementById('email').value;
            const formState = document.getElementById('form-state');
            const successState = document.getElementById('success-state');
            const displayEmail = document.getElementById('display-email');

            // Simulate loading
            const btn = event.target.querySelector('button');
            const originalText = btn.innerText;
            btn.disabled = true;
            btn.innerHTML = `<span class="inline-block animate-spin mr-2">◌</span> Enviando...`;

            setTimeout(() => {
                displayEmail.innerText = emailValue;
                formState.style.display = 'none';
                successState.style.display = 'block';
                btn.disabled = false;
                btn.innerText = originalText;
            }, 1000);
        }

        function resetForm() {
            document.getElementById('form-state').style.display = 'block';
            document.getElementById('success-state').style.display = 'none';
            document.getElementById('recovery-form').reset();
        }
    </script>
</body></html>
